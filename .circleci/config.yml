version: 2
jobs:
  build:
    docker:
      - image: golang:1.8.1
    working_directory: /go/src/github.com/pp2p/paranoid
    steps:
      - checkout
      - run:
          name: Get dependencies
          command: go get -v -u ./...
      - run:
          name: Build
          command: go build ./...
  test:
    docker:
      - image: golang:1.8.1
    working_directory: /go/src/github.com/pp2p/paranoid
    steps:
      - checkout
      - run:
          name: Get dependencies
          command: go get -v -i ./...
      - run:
          name: Test
          command: go test -v ./...
